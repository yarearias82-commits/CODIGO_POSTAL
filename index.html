<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Código Postal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>📍 Dirección</h1>
  <p>Ingresa tu código postal</p>

  <form id="formCP">

    <label for="cp">Código Postal:</label>
    <input 
      type="text" 
      id="cp" 
      name="cp"
      placeholder="Ej. 12345"
      pattern="[0-9]{5}" 
      maxlength="5"
      required
    >

    <small>Debe contener exactamente 5 números</small>

    <button type="submit">Enviar</button>
  </form>

  <p id="mensaje"></p>
</div>

<script src="script.js"></script>
</body>
</html>
